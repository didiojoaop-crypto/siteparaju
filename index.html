<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #fff5f8);
  color: #333;
  overflow-x: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;

}

button {

  padding: 14px;

  background: #ff6b9a;
  color: white;
  font-size: 16px;

.card {

  backdrop-filter: blur(12px);

  margin-top: 15px;

.overlay {

  display: none;

.box {

input {

.assinatura {

  bottom: 8px;

const texto = `Existe uma teoria antiga que diz que os verdadeiros amores nunca morrem, eles apenas fingem que não sentem mais nada, talvez seja verdade, né… Bom, pra ser sincero, eu atualizei esse texto muitas vezes ainda depois que paramos de nos falar, sempre volto aos meus mesmos pensamentos de ser pastor e te ver sentada me assistindo pregar,  as vezes te vejo e fico te admirando enquanto desvio o olhar para que você não perceba, e, quando raramente conversamos pessoalmente, não consigo olhar para nenhum lugar além de seus lindos olhos, depois de muito tempo, muitas orações, muitos outros textos que você provavelmente nunca verá, eu tenho a absoluta certeza que você também foi o meu primeiro amor, e, acho que nunca mais terei brecha para te falar isso, mas sim, você foi o meu primeiro amor, pois, eu não te amei apenas com os hormônios de adolescente, não apenas com o corpo, foi com a alma, foi com o espírito. Você é a segunda mulher que eu mais admiro nesse mundo depois da minha mãe, e, acho que esse foi um dos grandes motivos pelo qual  eu realmente decidi me tornar pastor, eu pensava “ como  vou conseguir cuidar da Ju? Como conseguirei ser uma boa pessoa para ela se nós nos casarmos? eu nem a mereço direito…” então, depois de muitas perguntas como essas, decidi olhar para o pastor Aguiar, vi o quão feliz a pastora Helô é com ele, vi seus filhos tendo orgulho do pai, e entendi como eu poderia dar uma vida linda para a mulher que eu mais amei na minha vida, eu entendi como poderia cuidar da segunda garota que eu mais admiro, olhando para o homem que eu mais admiro, e, por fim, percebi que Deus estava agradado dessa decisão, eu tinha certeza, a melhor forma de cuidar de você, seria cuidar de mim primeiro, e ser tão trabalhador como um pastor, agora entendo que preciso melhorar muito antes de te amar, se é que um dia eu vou poder dizer que te amo novamente, agora eu to focando mais em mim, sabe? Mas acho que uma das maiores motivações que tenho, é você. É, eu não KKKKKKKKKKK, sabe, Ju… Eu não apenas te amei, foi muito mais que isso, eu amo o fato de que no português, diferente de todas as outras línguas, existe a palavra “SAUDADE”, e nesse momento eu agradeço por ser brasieliro, pois aqui existe uma palavra que eu posso dedicar apenas a você. QUE SACOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOO. Pq vc ainda duvida que a gente poderia ser feliz? Eu admito, te entender é muito difícil, mas, sabe que eu não ligo? Acho que poucos garotos estariam disposto a ficar tanto tempo aqui. Acho que poucos teriam a coragem de te pedir em namoro para todos os mil membros da sua família, mas, eu tenho certeza que faria isso com muita felicidade, mesmo que eu apanhasse por um martelo kkkkkkkkkkkkkkkkkkkk. Poucos conseguiriam sobreviver a todas as suas fases, mas, pro seu azar, eu aguentei, por você, eu aguentei, e aguentaria outras mil vezes, não por humilhação, não por ser trouxa, não por ser maluco, mas por simplesmente querer que seja você. É, se você existisse em outro planeta, eu passaria a eternidade inteira vagando pelo espaço vazio, te procurando até te encontrar, mesmo se, ao chegar lá eu só pudesse te ver de longe e crer na falsa, boba e infundada esperança de um dia viver algo com você de novo. Talvez, logo, você encontre outro alguém, e, não da pra negar, eu tenho muito medo disso, mas, jamais faria algo para inibir sua alegria, eu quero que você seja muito feliz, seja comigo, ou sem migo. Eu te amo, Juliane dos Santos Trindade, (Lu).
`;

function abrirPoemas(){
  const div = document.getElementById("poemas");
  div.innerHTML = "";
  poemas.forEach(p=>{
    const el = document.createElement("div");
    el.className = "poema";
    el.innerText = p;
    div.appendChild(el);
  });
  div.style.display = "block";
}

function abrirSenha(){
  document.getElementById("senhaBox").style.display = "flex";
}

function verificar(){
  const senha = document.getElementById("senhaInput").value;
  if(senha === "OVELHA"){
    document.getElementById("senhaBox").style.display = "none";
    document.getElementById("textoBox").style.display = "block";
    document.getElementById("texto").innerText = texto;
  } else {
    alert("senha errada 😔");
  }
}

/* partículas */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let p = [];
for(let i=0;i<30;i++){
  p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*3});
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(255,105,180,0.4)";
  p.forEach(a=>{
    ctx.beginPath();
    ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
    ctx.fill();
    a.y-=0.3;
    if(a.y<0)a.y=canvas.height;
  });
  requestAnimationFrame(draw);
}
draw();
